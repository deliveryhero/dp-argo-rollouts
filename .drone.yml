kind: pipeline
type: docker
name: controller

features:
  docker-daemon@v1:
    enabled: true

trigger:
  event:
    - tag

steps:
  - name: build
    image: golang:1.22
    commands:
      - make controller
        
  - name: push
    image: plugins/harbor
    settings:
      repo: ${DRONE_REPO}
      tags:
        - ${DRONE_TAG}
